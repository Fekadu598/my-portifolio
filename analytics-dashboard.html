<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics Dashboard</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--kimi-color-text-primary:rgba(255,255,255,.92);
--kimi-color-text-secondary:rgba(255,255,255,.56);
--kimi-color-text-tertiary:rgba(255,255,255,.36);
--kimi-color-text-quaternary:rgba(255,255,255,.2);
--kimi-color-surface:transparent;
--kimi-color-surface-muted:rgba(255,255,255,.03);
--kimi-color-surface-raised:rgba(255,255,255,.05);
--kimi-color-surface-strong:rgba(255,255,255,.08);
--kimi-color-border:rgba(255,255,255,.08);
--kimi-color-danger:#ef4444;
--kimi-color-positive:#22c55e;
--kimi-color-warning:#eab308;
--kimi-chart-1:#3b82f6;
--kimi-chart-2:#ef4444;
--kimi-chart-3:#22c55e;
--kimi-chart-4:#a855f7;
--kimi-chart-5:#6b7280;
--kimi-font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
--kimi-font-mono:'SF Mono','Fira Code','Cascadia Code',monospace;
--t-micro:60ms;
--t-fast:150ms;
--t-normal:200ms;
--t-slow:300ms;
--ease-out:cubic-bezier(.16,1,.3,1);
--ease-in:cubic-bezier(.7,0,.84,0);
--ease-standard:cubic-bezier(.45,0,.55,1);
}
html{font-size:16px}
body{font-family:var(--kimi-font-sans);background:#050505;color:var(--kimi-color-text-primary);line-height:1.5;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font:inherit;border:none;background:none;color:inherit}
button{cursor:pointer}
.dashboard{max-width:1200px;margin:0 auto;padding:32px 24px}
.dash-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:32px;gap:16px;flex-wrap:wrap}
.dash-title{font-size:28px;font-weight:500;line-height:1.08;letter-spacing:-.02em}
.dash-meta{font-size:13px;color:var(--kimi-color-text-tertiary);display:flex;align-items:center;gap:8px}
.dash-live{width:6px;height:6px;border-radius:50%;background:var(--kimi-color-positive);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{padding:20px;border-radius:12px;border:1px solid var(--kimi-color-border);background:var(--kimi-color-surface);transition:border-color var(--t-fast) var(--ease-out)}
.stat-card:hover{border-color:var(--kimi-color-surface-strong)}
.stat-label{font-size:12px;color:var(--kimi-color-text-tertiary);margin-bottom:8px;letter-spacing:.02em}
.stat-value{font-size:32px;font-weight:500;line-height:1.08;letter-spacing:-.02em;font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
.stat-change{display:inline-flex;align-items:center;gap:4px;font-size:12px;margin-top:8px;font-variant-numeric:tabular-nums}
.stat-up{color:var(--kimi-color-positive)}
.stat-down{color:var(--kimi-color-danger)}
.chart-panel{border:1px solid var(--kimi-color-border);border-radius:12px;padding:24px;margin-bottom:16px;background:var(--kimi-color-surface);overflow:hidden}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.chart-title{font-size:15px;font-weight:500}
.chart-tabs{display:flex;gap:2px;background:var(--kimi-color-surface-muted);border-radius:8px;padding:2px}
.chart-tab{padding:6px 14px;font-size:13px;border-radius:6px;color:var(--kimi-color-text-secondary);transition:all var(--t-fast) var(--ease-out)}
.chart-tab:hover{color:var(--kimi-color-text-primary)}
.chart-tab.active{background:var(--kimi-color-surface-strong);color:var(--kimi-color-text-primary)}
.chart-area{position:relative;height:280px;cursor:crosshair;user-select:none}
.chart-svg{width:100%;height:100%}
.chart-tooltip{position:absolute;pointer-events:none;opacity:0;transition:opacity var(--t-fast) var(--ease-out);background:var(--kimi-color-surface-raised);border:1px solid var(--kimi-color-border);border-radius:8px;padding:10px 14px;font-size:12px;z-index:10;white-space:nowrap;transform:translate(-50%,-100%);margin-top:-8px}
.chart-tooltip.show{opacity:1}
.chart-tooltip-label{color:var(--kimi-color-text-tertiary);margin-bottom:2px}
.chart-tooltip-value{font-weight:500;font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
.chart-crosshair{position:absolute;top:0;width:1px;height:100%;background:var(--kimi-color-text-quaternary);pointer-events:none;opacity:0;transition:opacity var(--t-micro) var(--ease-out)}
.chart-crosshair.show{opacity:1}
.chart-dot{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--kimi-chart-1);border:2px solid #050505;pointer-events:none;opacity:0;transition:opacity var(--t-fast) var(--ease-out);transform:translate(-50%,-50%)}
.chart-dot.show{opacity:1}
.chart-grid-line{stroke:var(--kimi-color-text-quaternary);stroke-width:1}
.chart-line{fill:none;stroke:var(--kimi-chart-1);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.chart-area-fill{opacity:.08}
.chart-label{fill:var(--kimi-color-text-quaternary);font-size:11px;font-family:var(--kimi-font-sans);font-variant-numeric:tabular-nums}
.compare-section{border:1px solid var(--kimi-color-border);border-radius:12px;background:var(--kimi-color-surface);margin-bottom:16px;overflow:hidden}
.compare-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;cursor:pointer;transition:background var(--t-fast) var(--ease-out)}
.compare-header:hover{background:var(--kimi-color-surface-muted)}
.compare-header-left{display:flex;align-items:center;gap:12px}
.compare-chevron{width:16px;height:16px;color:var(--kimi-color-text-tertiary);transition:transform var(--t-slow) var(--ease-out)}
.compare-header.open .compare-chevron{transform:rotate(180deg)}
.compare-title{font-size:15px;font-weight:500}
.compare-badge{font-size:11px;padding:2px 8px;border-radius:4px;background:var(--kimi-color-surface-raised);color:var(--kimi-color-text-secondary);font-variant-numeric:tabular-nums}
.compare-body{max-height:0;overflow:hidden;transition:max-height var(--t-slow) var(--ease-standard)}
.compare-body.open{max-height:600px}
.compare-content{padding:0 24px 24px}
.compare-table{width:100%;border-collapse:collapse}
.compare-table th{text-align:left;font-size:11px;font-weight:500;color:var(--kimi-color-text-tertiary);padding:8px 12px;border-bottom:1px solid var(--kimi-color-border);letter-spacing:.04em;text-transform:lowercase}
.compare-table td{font-size:14px;padding:12px;border-bottom:1px solid var(--kimi-color-border);font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
.compare-table tr:last-child td{border-bottom:none}
.compare-table tr:hover td{background:var(--kimi-color-surface-muted)}
.compare-bar-cell{position:relative;width:120px}
.compare-bar{height:4px;border-radius:2px;background:var(--kimi-chart-1);transition:width var(--t-slow) var(--ease-out)}
.compare-bar.secondary{background:var(--kimi-chart-4)}
.sparkline-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.spark-card{border:1px solid var(--kimi-color-border);border-radius:12px;padding:20px;background:var(--kimi-color-surface);transition:border-color var(--t-fast) var(--ease-out)}
.spark-card:hover{border-color:var(--kimi-color-surface-strong)}
.spark-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.spark-label{font-size:12px;color:var(--kimi-color-text-tertiary)}
.spark-value{font-size:22px;font-weight:500;letter-spacing:-.01em;font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
.spark-svg{width:100%;height:48px}
.spark-line{fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.table-panel{border:1px solid var(--kimi-color-border);border-radius:12px;background:var(--kimi-color-surface);overflow:hidden}
.table-panel-header{padding:20px 24px;border-bottom:1px solid var(--kimi-color-border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.table-search{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;border:1px solid var(--kimi-color-border);background:var(--kimi-color-surface-muted);transition:border-color var(--t-fast) var(--ease-out)}
.table-search:focus-within{border-color:var(--kimi-color-text-tertiary)}
.table-search input{font-size:13px;width:160px;outline:none}
.table-search input::placeholder{color:var(--kimi-color-text-tertiary)}
.data-table{width:100%;border-collapse:collapse}
.data-table th{text-align:left;font-size:11px;font-weight:500;color:var(--kimi-color-text-tertiary);padding:12px 24px;border-bottom:1px solid var(--kimi-color-border);letter-spacing:.04em;text-transform:lowercase}
.data-table td{font-size:14px;padding:14px 24px;border-bottom:1px solid var(--kimi-color-border);font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1;transition:background var(--t-fast) var(--ease-out)}
.data-table tr:last-child td{border-bottom:none}
.data-table tbody tr:hover td{background:var(--kimi-color-surface-muted)}
.data-table .row-actions{opacity:0;transition:opacity var(--t-fast) var(--ease-out)}
.data-table tbody tr:hover .row-actions,.data-table tbody tr:focus-within .row-actions{opacity:1}
.icon-btn{width:28px;height:28px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;color:var(--kimi-color-text-tertiary);transition:all var(--t-fast) var(--ease-out)}
.icon-btn:hover{background:var(--kimi-color-surface-strong);color:var(--kimi-color-text-primary)}
.icon-btn:active{transform:scale(.96)}
.tag{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:12px;font-variant-numeric:tabular-nums}
.tag-blue{background:rgba(59,130,246,.12);color:var(--kimi-chart-1)}
.tag-green{background:rgba(34,197,94,.12);color:var(--kimi-chart-3)}
.tag-red{background:rgba(239,68,68,.12);color:var(--kimi-chart-2)}
.tag-purple{background:rgba(168,85,247,.12);color:var(--kimi-chart-4)}
@media(max-width:768px){.stats-row,.sparkline-row{grid-template-columns:1fr}.chart-area{height:200px}.data-table th:nth-child(n+4),.data-table td:nth-child(n+4){display:none}}
</style>
</head>
<body>
<div class="dashboard">
<div class="dash-header">
<div>
<h1 class="dash-title">Analytics overview</h1>
<div class="dash-meta"><span class="dash-live"></span><span>Last updated just now</span></div>
</div>
<div class="chart-tabs" role="tablist">
<button class="chart-tab active" role="tab" aria-selected="true" data-range="7d">7d</button>
<button class="chart-tab" role="tab" aria-selected="false" data-range="30d">30d</button>
<button class="chart-tab" role="tab" aria-selected="false" data-range="90d">90d</button>
</div>
</div>

<div class="stats-row" id="statsRow"></div>

<div class="sparkline-row" id="sparklines"></div>

<div class="chart-panel">
<div class="chart-header">
<span class="chart-title">Revenue trend</span>
<div class="chart-tabs" role="tablist">
<button class="chart-tab active" data-metric="revenue" role="tab">Revenue</button>
<button class="chart-tab" data-metric="orders" role="tab">Orders</button>
<button class="chart-tab" data-metric="visitors" role="tab">Visitors</button>
</div>
</div>
<div class="chart-area" id="mainChart">
<svg class="chart-svg" id="chartSvg" preserveAspectRatio="none"></svg>
<div class="chart-crosshair" id="crosshair"></div>
<div class="chart-dot" id="chartDot"></div>
<div class="chart-tooltip" id="chartTooltip">
<div class="chart-tooltip-label" id="ttLabel"></div>
<div class="chart-tooltip-value" id="ttValue"></div>
</div>
</div>
</div>

<div class="compare-section">
<div class="compare-header open" id="compareToggle" role="button" tabindex="0" aria-expanded="true" aria-controls="compareBody">
<div class="compare-header-left">
<svg class="compare-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
<span class="compare-title">Period comparison</span>
</div>
<span class="compare-badge">vs previous period</span>
</div>
<div class="compare-body open" id="compareBody">
<div class="compare-content">
<table class="compare-table">
<thead><tr><th>metric</th><th>this period</th><th>previous</th><th>change</th><th>trend</th></tr></thead>
<tbody id="compareBodyInner"></tbody>
</table>
</div>
</div>
</div>

<div class="table-panel">
<div class="table-panel-header">
<span class="chart-title">Top pages</span>
<div class="table-search">
<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
<input type="text" placeholder="Search pages..." id="tableSearch" aria-label="Search pages">
</div>
</div>
<table class="data-table">
<thead><tr><th>page</th><th>views</th><th>unique</th><th>bounce</th><th>duration</th><th></th></tr></thead>
<tbody id="tableBody"></tbody>
</table>
</div>
</div>

<script>
var DATA={
metrics:[
{label:'Total revenue',value:48250,change:12.4,up:true,prefix:'$',suffix:''},
{label:'Total orders',value:1847,change:8.2,up:true,prefix:'',suffix:''},
{label:'Conversion rate',value:3.24,change:0.8,up:true,prefix:'',suffix:'%',decimals:2},
{label:'Avg order value',value:261,change:-2.1,up:false,prefix:'$',suffix:''}
],
sparks:[
{label:'Pageviews',value:'124.8k',change:'+14%',color:'var(--kimi-chart-1)',data:[30,45,35,60,50,70,65,80,75,90,85,95]},
{label:'Sessions',value:'38.2k',change:'+9%',color:'var(--kimi-chart-3)',data:[20,35,30,45,55,50,60,55,70,65,75,80]},
{label:'Bounce rate',value:'32.1%',change:'-3%',color:'var(--kimi-chart-2)',data:[60,55,50,45,40,35,38,32,30,28,25,22]}
],
chartData:{
revenue:{labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],values:[4200,5800,4900,7200,6100,8400,7600],unit:'$'},
orders:{labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],values:[180,240,210,320,280,380,340],unit:''},
visitors:{labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],values:[2400,3100,2800,4200,3600,5100,4600],unit:''}
},
compare:[
{metric:'Revenue',current:'$48,250',previous:'$42,960',change:'+12.4%',up:true,pct:85},
{metric:'Orders',current:'1,847',previous:'1,708',change:'+8.2%',up:true,pct:78},
{metric:'Conversion',current:'3.24%',previous:'3.21%',change:'+0.8%',up:true,pct:62},
{metric:'Bounce rate',current:'32.1%',previous:'34.8%',change:'-7.7%',up:true,pct:45},
{metric:'Session duration',current:'4m 32s',previous:'3m 58s',change:'+14.2%',up:true,pct:72}
],
pages:[
{path:'/dashboard',views:'12,847',unique:'8,234',bounce:'24%',duration:'5m 12s',tag:'blue'},
{path:'/pricing',views:'8,432',unique:'6,128',bounce:'31%',duration:'3m 45s',tag:'purple'},
{path:'/docs/getting-started',views:'6,218',unique:'4,892',bounce:'18%',duration:'7m 02s',tag:'green'},
{path:'/blog/launch',views:'4,956',unique:'3,647',bounce:'42%',duration:'2m 18s',tag:'red'},
{path:'/changelog',views:'3,214',unique:'2,189',bounce:'28%',duration:'4m 33s',tag:'blue'},
{path:'/support',views:'2,891',unique:'1,976',bounce:'35%',duration:'6m 14s',tag:'green'}
]
};

function animateValue(el,start,end,dur,decimals,prefix,suffix){
var startTime=null;
function step(ts){
if(!startTime)startTime=ts;
var p=Math.min((ts-startTime)/dur,1);
var ease=1-Math.pow(1-p,3);
var val=start+(end-start)*ease;
el.textContent=(prefix||'')+(decimals?val.toFixed(decimals):Math.round(val).toLocaleString())+(suffix||'');
if(p<1)requestAnimationFrame(step);
}
requestAnimationFrame(step);
}

function buildStats(){
var row=document.getElementById('statsRow');
DATA.metrics.forEach(function(m){
var card=document.createElement('div');
card.className='stat-card';
var valEl=document.createElement('div');
valEl.className='stat-value';
valEl.textContent=(m.prefix||'')+'0'+(m.suffix||'');
var ch=document.createElement('div');
ch.className='stat-change '+(m.up?'stat-up':'stat-down');
ch.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="'+(m.up?'18 15 12 9 6 15':'6 9 12 15 18 9')+'"/></svg>'+m.change+'%';
card.innerHTML='<div class="stat-label">'+m.label+'</div>';
card.appendChild(valEl);
card.appendChild(ch);
row.appendChild(card);
setTimeout(function(){animateValue(valEl,0,m.value,1200,m.decimals,m.prefix,m.suffix)},200);
});
}

function buildSparklines(){
var c=document.getElementById('sparklines');
DATA.sparks.forEach(function(s){
var card=document.createElement('div');
card.className='spark-card';
var d=s.data;
var max=Math.max.apply(null,d);
var min=Math.min.apply(null,d);
var range=max-min||1;
var pts=d.map(function(v,i){return(i/(d.length-1)*100)+','+(100-((v-min)/range)*80-10)}).join(' ');
card.innerHTML='<div class="spark-header"><span class="spark-label">'+s.label+'</span><span class="spark-value">'+s.value+'</span></div>';
var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
svg.setAttribute('class','spark-svg');
svg.setAttribute('viewBox','0 0 100 100');
svg.setAttribute('preserveAspectRatio','none');
var pl=document.createElementNS('http://www.w3.org/2000/svg','polyline');
pl.setAttribute('points',pts);
pl.setAttribute('class','spark-line');
pl.setAttribute('stroke',s.color);
pl.style.opacity='0';
svg.appendChild(pl);
card.appendChild(svg);
c.appendChild(card);
setTimeout(function(){pl.style.transition='opacity .6s ease';pl.style.opacity='1'},400);
});
}

function buildChart(metric){
var svg=document.getElementById('chartSvg');
svg.innerHTML='';
var d=DATA.chartData[metric];
var w=svg.getBoundingClientRect().width||800;
var h=280;
var pad={t:20,r:20,b:36,l:56};
var cw=w-pad.l-pad.r;
var ch=h-pad.t-pad.b;
var max=Math.max.apply(null,d.values)*1.1;
var min=0;
var range=max-min;
var pts=d.values.map(function(v,i){return{x:pad.l+(i/(d.values.length-1))*cw,y:pad.t+(1-(v-min)/range)*ch}});
var pathD='M'+pts.map(function(p){return p.x+','+p.y}).join(' L');
var areaD=pathD+' L'+pts[pts.length-1].x+','+(h-pad.b)+' L'+pts[0].x+','+(h-pad.b)+' Z';
var gridLines=5;
for(var i=0;i<=gridLines;i++){
var y=pad.t+(i/gridLines)*ch;
var line=document.createElementNS('http://www.w3.org/2000/svg','line');
line.setAttribute('x1',pad.l);line.setAttribute('x2',w-pad.r);
line.setAttribute('y1',y);line.setAttribute('y2',y);
line.setAttribute('class','chart-grid-line');
svg.appendChild(line);
var label=document.createElementNS('http://www.w3.org/2000/svg','text');
label.setAttribute('x',pad.l-8);label.setAttribute('y',y+4);
label.setAttribute('class','chart-label');label.setAttribute('text-anchor','end');
label.textContent=d.unit+Math.round(max-(i/gridLines)*range).toLocaleString();
svg.appendChild(label);
}
d.labels.forEach(function(l,i){
var x=pad.l+(i/(d.labels.length-1))*cw;
var label=document.createElementNS('http://www.w3.org/2000/svg','text');
label.setAttribute('x',x);label.setAttribute('y',h-8);
label.setAttribute('class','chart-label');label.setAttribute('text-anchor','middle');
label.textContent=l;
svg.appendChild(label);
});
var area=document.createElementNS('http://www.w3.org/2000/svg','path');
area.setAttribute('d',areaD);area.setAttribute('fill','var(--kimi-chart-1)');area.setAttribute('class','chart-area-fill');
svg.appendChild(area);
var path=document.createElementNS('http://www.w3.org/2000/svg','path');
path.setAttribute('d',pathD);path.setAttribute('class','chart-line');
var len=path.getTotalLength?1200:0;
path.style.strokeDasharray=len;path.style.strokeDashoffset=len;
svg.appendChild(path);
setTimeout(function(){path.style.transition='stroke-dashoffset 1.2s cubic-bezier(.16,1,.3,1)';path.style.strokeDashoffset='0'},100);
pts.forEach(function(p,i){
var dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
dot.setAttribute('cx',p.x);dot.setAttribute('cy',p.y);dot.setAttribute('r','0');
dot.setAttribute('fill','var(--kimi-chart-1)');dot.setAttribute('stroke','#050505');dot.setAttribute('stroke-width','2');
dot.style.transition='r .3s cubic-bezier(.16,1,.3,1) '+(i*80)+'ms';
svg.appendChild(dot);
setTimeout(function(){dot.setAttribute('r','4')},200);
});
svg._pts=pts;svg._data=d;
}

function setupChartInteraction(){
var area=document.getElementById('mainChart');
var crosshair=document.getElementById('crosshair');
var dot=document.getElementById('chartDot');
var tooltip=document.getElementById('chartTooltip');
var ttLabel=document.getElementById('ttLabel');
var ttValue=document.getElementById('ttValue');
var svg=document.getElementById('chartSvg');
area.addEventListener('mousemove',function(e){
var rect=area.getBoundingClientRect();
var x=e.clientX-rect.left;
var pts=svg._pts;
var d=svg._data;
if(!pts||!d)return;
var closest=pts[0];
var closestIdx=0;
pts.forEach(function(p,i){if(Math.abs(p.x-x)<Math.abs(closest.x-x)){closest=p;closestIdx=i}});
crosshair.style.left=closest.x+'px';
crosshair.classList.add('show');
dot.style.left=closest.x+'px';
dot.style.top=closest.y+'px';
dot.classList.add('show');
ttLabel.textContent=d.labels[closestIdx];
ttValue.textContent=(d.unit||'')+closest.value.toLocaleString();
tooltip.style.left=closest.x+'px';
tooltip.style.top=closest.y+'px';
tooltip.classList.add('show');
});
area.addEventListener('mouseleave',function(){
crosshair.classList.remove('show');
dot.classList.remove('show');
tooltip.classList.remove('show');
});
}

function buildCompare(){
var body=document.getElementById('compareBodyInner');
DATA.compare.forEach(function(r){
var tr=document.createElement('tr');
tr.innerHTML='<td style="color:var(--kimi-color-text-secondary)">'+r.metric+'</td><td>'+r.current+'</td><td style="color:var(--kimi-color-text-tertiary)">'+r.previous+'</td><td><span class="stat-change '+(r.up?'stat-up':'stat-down')+'" style="font-size:13px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="'+(r.up?'18 15 12 9 6 15':'6 9 12 15 18 9')+'"/></svg>'+r.change+'</span></td><td class="compare-bar-cell"><div class="compare-bar" style="width:0%" data-target="'+r.pct+'"></div></td>';
body.appendChild(tr);
});
setTimeout(function(){
document.querySelectorAll('.compare-bar').forEach(function(bar){
bar.style.width=bar.dataset.target+'%';
});
},300);
}

function setupCompareToggle(){
var toggle=document.getElementById('compareToggle');
var body=document.getElementById('compareBody');
toggle.addEventListener('click',function(){
var open=body.classList.toggle('open');
toggle.classList.toggle('open',open);
toggle.setAttribute('aria-expanded',open);
});
toggle.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle.click()}});
}

function buildTable(filter){
var tbody=document.getElementById('tableBody');
tbody.innerHTML='';
var pages=DATA.pages.filter(function(p){return!filter||p.path.toLowerCase().indexOf(filter.toLowerCase())>-1});
pages.forEach(function(p){
var tr=document.createElement('tr');
tr.innerHTML='<td style="font-family:var(--kimi-font-mono);font-size:13px">'+p.path+'</td><td>'+p.views+'</td><td>'+p.unique+'</td><td>'+p.bounce+'</td><td>'+p.duration+'</td><td class="row-actions"><button class="icon-btn" aria-label="Copy link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></button></td>';
tbody.appendChild(tr);
});
}

function setupTableSearch(){
document.getElementById('tableSearch').addEventListener('input',function(e){
buildTable(e.target.value);
});
}

function setupTabs(){
document.querySelectorAll('.chart-tabs .chart-tab[data-range]').forEach(function(tab){
tab.addEventListener('click',function(){
tab.parentElement.querySelectorAll('.chart-tab').forEach(function(t){t.classList.remove('active');t.setAttribute('aria-selected','false')});
tab.classList.add('active');tab.setAttribute('aria-selected','true');
});
});
document.querySelectorAll('.chart-panel .chart-tab[data-metric]').forEach(function(tab){
tab.addEventListener('click',function(){
tab.parentElement.querySelectorAll('.chart-tab').forEach(function(t){t.classList.remove('active')});
tab.classList.add('active');
buildChart(tab.dataset.metric);
setTimeout(setupChartInteraction,50);
});
});
}

buildStats();
buildSparklines();
buildChart('revenue');
setTimeout(setupChartInteraction,100);
buildCompare();
setupCompareToggle();
buildTable();
setupTableSearch();
setupTabs();
</script>
</body>
</html>
